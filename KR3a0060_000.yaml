body:
  text: 心經儒家類提要臣等謹案心經一卷宋真德秀撰是編集聖賢論心格言而以諸家議論為之注末附四言贊一首端平元年顔若愚鋟于泉州府學有跋一首稱其築室粵山之下雖晏息之地常如君父之臨其前淳祐二年大庾令趙時棣又以此書與政經合刻前有德秀門人王邁序云心經一書行于世至徹禁中端平乙未公薨後兩月從臣洪公咨䕫在經筵上出公心經曰真某此書朕乙夜覽而嘉之卿宜為之序其見重也如此文獻通考作心經法語與書録解題相合蓋一書而二名耳明程敏政嘗為作注而疑其中有引及真西山讀書記者非德秀之原文殆後人又有所附益焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b0be1f1f513eb5aaaedf79b1bb282839475a73b32d1a20dc26e2a677abb2c1ef
